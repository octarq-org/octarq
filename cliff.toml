# git-cliff configuration — Conventional Commits changelog
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
          {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

commit_parsers = [
  { message = "^fix\\(security\\)|^sec", group = "<!-- 0 -->🔒 Security" },
  { message = "^feat", group = "<!-- 1 -->🚀 Features" },
  { message = "^fix", group = "<!-- 2 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 3 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 4 -->♻️ Refactor" },
  { message = "^doc", group = "<!-- 5 -->📚 Documentation" },
  { message = "^test", group = "<!-- 6 -->🧪 Testing" },
  { message = "^a11y|^privacy", group = "<!-- 7 -->♿ Accessibility & Privacy" },
  { message = "^ci|^build", group = "<!-- 8 -->⚙️ CI & Build" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore|^style", group = "<!-- 9 -->🧹 Chores" },
  { message = ".*", group = "<!-- 10 -->📦 Other" },
]
