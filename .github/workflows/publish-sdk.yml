name: Publish SDK

# Publishes @octarq-org/plugin-sdk.
#
# Two paths:
#   1. push to main  -> changesets flow. If unconsumed changesets exist, the
#      changesets action opens/updates a "Version Packages" PR. When that PR is
#      merged (a subsequent push to main with the version bump committed and the
#      changeset files removed), the same action runs `pnpm changeset publish`
#      and pushes the package. This is self-guarding: with no changesets there
#      is nothing to version, and after publishing the changesets are gone, so
#      it cannot loop.
#   2. push of an `sdk-v*` tag -> direct one-shot publish of the current SDK
#      version (escape hatch / manual release).

# Enabled for the first release: on push to main the changesets action opens a
# "Version Packages" PR when unconsumed changesets exist, and publishes once that
# PR is merged. Also runnable via manual dispatch and sdk-v* tags.
#
# Prerequisite: the `@octarq-org` GitHub Packages registry must exist / be
# writable by GITHUB_TOKEN, or the publish half fails (the version PR still opens).
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["sdk-v*"]

# Top-level: least privilege. The changesets job widens this locally.
permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Changesets-driven release on main ────────────────────────────────────
  release:
    name: Version or publish (changesets)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # commit version bumps / push tags
      packages: write        # publish to GitHub Packages
      pull-requests: write   # open the "Version Packages" PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4 # keep in sync with root package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@octarq-org"

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @octarq-org/plugin-sdk build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node wrote ~/.npmrc; changeset publish -> pnpm publish reads
          # NODE_AUTH_TOKEN for //npm.pkg.github.com/:_authToken.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── One-shot publish on an sdk-v* tag ────────────────────────────────────
  tag-publish:
    name: Publish on sdk-v* tag
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@octarq-org"

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @octarq-org/plugin-sdk build

      - name: Publish
        run: pnpm publish --filter @octarq-org/plugin-sdk --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
