name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  vulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  go:
    name: Go test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

  web:
    name: Frontend build
    runs-on: ubuntu-latest
    permissions:
      contents: write # auto-commit webembed/dist on main
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4 # keep in sync with web/package.json "packageManager"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Advisory only: surfaces known CVEs in frontend deps without gating the
      # build (a fresh upstream advisory shouldn't block an unrelated merge).
      - name: Audit dependencies
        run: pnpm audit --prod || true

      - name: Type-check
        run: pnpm typecheck

      - name: Build dashboard
        run: pnpm build

      # webembed/dist must stay committed: octarq-pro consumes octarq as a Go module
      # and gets the embedded dashboard from the module zip. CI keeps it fresh
      # so nobody has to build and commit dist locally. Commits made with
      # GITHUB_TOKEN don't retrigger workflows, so this can't loop.
      - name: Commit refreshed webembed/dist (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(web): refresh embedded dashboard build [auto]"
          file_pattern: webembed/dist
